{% extends "base.html" %} {% block head_extra %}
<link
  rel="stylesheet"
  href="{{ url_for('static', filename='css/login.css') }}"
/>
{% endblock %} {% block content %}
<div class="login-page">
  <div class="login-card">
    <h1 class="login-title">User Login</h1>
    <p class="login-subtitle">保存・履歴・統計機能はログイン後に利用できます</p>

    <form id="loginForm" class="login-form">
      <div class="form-group">
        <label for="email">メールアドレス</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="example@email.com"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">パスワード</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="password"
          required
        />
      </div>

      <p id="loginError" class="login-error hidden"></p>
      <p id="loginInfo" class="login-info hidden"></p>

      <div class="login-actions">
        <button type="submit" class="login-btn">Login</button>

        <button id="guestLoginBtn" type="button" class="guest-btn">
          Guest User で試す
        </button>

        <a href="/" class="back-link">トップへ戻る</a>
      </div>
    </form>
  </div>
</div>
{% endblock %} {% block scripts %}
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
<script src="{{ url_for('static', filename='js/login.js') }}"></script>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const guestLoginBtn = document.getElementById("guestLoginBtn");

    guestLoginBtn?.addEventListener("click", () => {
      if (typeof startGuestMode === "function") {
        startGuestMode();
      } else if (typeof clearAuth === "function") {
        clearAuth();
      }

      window.location.href = "/select";
    });
  });
</script>
{% endblock %}
